{% set version = "5.0.2" %}

package:
  name: social-auth-core
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/s/social-auth-core/social_auth_core-{{ version }}.tar.gz
  sha256: f53930c9b2a86ee0fc8e8fb0eac79221cfc2f017d9efb578691e5a3e2cf36784

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python {{ python_min }}
    - setuptools >=78.0.2
    - pip
  run:
    - python >={{ python_min }}
    - cryptography >=46.0.7
    - defusedxml >=0.7.1
    - oauthlib >=3.3.1
    - pyjwt >=2.13.0
    - python3-openid >=3.2.0
    - requests-oauthlib >=2.0.0
    - requests >=2.34.0

test:
  imports:
    - social_core
    - social_core.backends
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}


about:
  home: https://github.com/python-social-auth/social-core
  license: BSD-3-Clause
  license_file: LICENSE
  summary: Python social authentication made simple

extra:
  recipe-maintainers:
    - ocefpaf
