{% set version = "4.9.0" %}

package:
  name: social-auth-core
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/s/social-auth-core/social_auth_core-{{ version }}.tar.gz
  sha256: 463e8bb6f26ec0f5c264d19e351b1f1a5f929192bc38432cb9d44c6ae380cc17

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python {{ python_min }}
    - setuptools >=78.0.2
    - pip
  run:
    - python >={{ python_min }}
    - cryptography >=46.0.7
    - defusedxml >=0.7.1
    - oauthlib >=3.3.1
    - pyjwt >=2.12.1
    - python3-openid >=3.2.0
    - requests-oauthlib >=2.0.0
    - requests >=2.33.1

test:
  imports:
    - social_core
    - social_core.backends
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}


about:
  home: https://github.com/python-social-auth/social-core
  license: BSD-3-Clause
  license_file: LICENSE
  summary: Python social authentication made simple

extra:
  recipe-maintainers:
    - ocefpaf
